<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zion Narrows Conditions</title>

<link href="https://fonts.googleapis.com/css2?family=Paytone+One&display=swap" rel="stylesheet">

<style>
body {
margin: 0;
background: #f6efe6;
font-family: "Century Gothic", Arial, sans-serif;
color: #2b2b2b;
}

.wrap {
width: 100vw;
height: 100vh;
padding: 3vh 4vw;
box-sizing: border-box;
display: grid;
grid-template-rows: auto auto auto auto 1fr;
gap: 18px;
}

.title {
text-align: center;
font-size: 44px;
font-family: "Paytone One", sans-serif;
letter-spacing: 3px;
color: #5a4333;
}

.titleDisclaimer {
text-align: center;
font-size: 14px;
line-height: 1.5;
color: #6b5a4d;
max-width: 900px;
margin: -6px auto 0;
opacity: 0.9;
}

.metrics {
display: flex;
justify-content: space-between;
gap: 24px;
}

.card {
flex: 1;
border-radius: 18px;
padding: 18px;
box-shadow: 0 12px 25px rgba(70, 50, 30, 0.12);
border: 1px solid #e7d6c2;

display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
}

/* CFS CARD */
.metrics .card:first-child {
background: linear-gradient(180deg, #ead3bb, #dcc0a4);
}

/* WATER TEMP CARD */
.metrics .card:last-child {
background: linear-gradient(180deg, #d9f0ff, #bcdff5);
}

.bigNumber {
font-size: 110px;
font-weight: 900;
line-height: 1;
}

.tempNumber {
font-size: 75px;
font-weight: 900;
line-height: 1;
}

.label {
margin-top: 8px;
font-size: 20px;
font-weight: 800;
letter-spacing: 2px;
opacity: 0.75;
}

.trendInside {
margin-top: 10px;
font-size: 18px;
font-weight: 700;
opacity: 0.85;
}

.statusLabel {
text-align: center;
font-size: 16px;
font-weight: 800;
letter-spacing: 2px;
opacity: 0.7;
margin-bottom: -6px;
}

.statusBlock {
width: 100%;
border-radius: 18px;
padding: 10px;
display: flex;
justify-content: center;
align-items: center;
font-size: 28px;
font-weight: 900;
color: white;
box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
}

.gearWrapper {
background: linear-gradient(180deg, #fff7ec, #f2e2cf);
border-radius: 18px;
padding: 18px;
border: 1px solid #e7d6c2;
}

.gearTitle {
text-align: center;
font-weight: 900;
margin-bottom: 14px;
letter-spacing: 2px;
}

.gearBox {
background: linear-gradient(180deg, #fff7ec, #f2e2cf);
border: 1px solid #e7d6c2;
border-radius: 16px;
padding: 24px;
min-height: 110px;

display: flex;
justify-content: center;
align-items: center;
text-align: center;
}

.gearBoxValue {
font-size: 26px;
font-weight: 900;
line-height: 1.4;
}

.gearDisclaimer {
text-align: center;
margin-top: 12px;
font-size: 13px;
opacity: 0.7;
font-style: italic;
}

.forecastTitle {
text-align: center;
font-size: 24px;
font-family: "Paytone One", sans-serif;
letter-spacing: 2px;
margin-bottom: 14px;
opacity: 0.85;
color: #5a4333;
}

.forecast {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 22px;
}

.dayCard {
background: linear-gradient(180deg, #fff7ec, #f2e2cf);
border-radius: 16px;
padding: 26px 20px;
text-align: center;
border: 1px solid #e7d6c2;
position: relative;
}

.today {
border: 2px solid #6b4f3a;
background: #f3e6d6;
}

.todayTag {
position: absolute;
top: 8px;
right: 8px;
background: #6b4f3a;
color: white;
font-size: 12px;
font-weight: 900;
padding: 5px 10px;
border-radius: 999px;
}

.dayName {
font-weight: 900;
font-size: 28px;
margin-bottom: 14px;
color: #3b2f28;
}

.dayCard div {
font-size: 24px;
line-height: 1.6;
}

.bubble {
display: inline-block;
padding: 6px 12px;
border-radius: 999px;
font-size: 14px;
font-weight: 800;
color: white;
margin-top: 10px;
opacity: 0.95;
}

.low { background: #4f7d6b; }
.med { background: #c08a3e; }
.high { background: #a33a2a; }

.updated {
text-align: center;
font-size: 14px;
opacity: 0.75;
margin-top: 14px;
line-height: 1.4;
}

</style>
</head>

<body>

<div class="wrap">

<div class="title">ZION NARROWS CURRENT CONDITIONS</div>
<div class="titleDisclaimer">This screen is for educational purposes only and may contain inaccurate or outdated information. Weather and canyon conditions can change rapidly and unpredictably.</div>

<div class="metrics">

<div class="card">
<div id="flow" class="bigNumber">--</div>
<div class="label">CFS</div>
<div id="trend" class="trendInside">--</div>
</div>

<div class="card">
<div id="temp" class="tempNumber">--</div>
<div class="label">WATER TEMP</div>
</div>

</div>

<div class="statusLabel">NARROWS HIKE STATUS</div>
<div id="status" class="statusBlock">LOADING</div>

<div class="gearWrapper">

<div class="gearTitle">RECOMMENDED PACKAGE</div>

<div class="gearBox">
