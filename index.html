<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zion Narrows Conditions</title>

  <link href="https://fonts.googleapis.com/css2?family=Paytone+One&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f4ede3; /* canyon sand base */
      font-family: "Century Gothic", Arial, sans-serif;
      color: #2b2b2b;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 3vh 4vw;
      box-sizing: border-box;
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      gap: 18px;
    }

    .title {
      text-align: center;
      font-size: 44px;
      font-family: "Paytone One", sans-serif;
      letter-spacing: 3px;
      color: #3f3a33;
    }

    .metrics {
      display: flex;
      justify-content: space-between;
      gap: 24px;
    }

    .card {
      flex: 1;
      background: #fff8ef;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(70, 50, 30, 0.10);
      border: 1px solid #e7dccd;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .bigNumber {
      font-size: 110px;
      font-weight: 900;
      line-height: 1;
      color: #2b2b2b;
    }

    .tempNumber {
      font-size: 75px;
      font-weight: 900;
      line-height: 1;
      color: #2b2b2b;
    }

    .label {
      margin-top: 8px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      opacity: 0.75;
    }

    .trendInside {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
      opacity: 0.85;
    }

    .statusLabel {
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 2px;
      opacity: 0.7;
      margin-bottom: -6px;
    }

    .statusBlock {
      width: 100%;
      background: #fff8ef;
      border-radius: 18px;
      padding: 6px 14px;
      box-shadow: 0 10px 25px rgba(70, 50, 30, 0.10);
      border: 1px solid #e7dccd;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 28px;
      font-weight: 900;
      color: white;
    }

    /* GEAR SECTION */
    .gearWrapper {
      background: #fff8ef;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(70, 50, 30, 0.10);
      border: 1px solid #e7dccd;
    }

    .gearTitle {
      text-align: center;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.75;
      margin-bottom: 14px;
    }

    .gearGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .gearBox {
      background: linear-gradient(180deg, #fff8ef, #f4ede3);
      border: 1px solid #e7dccd;
      border-radius: 16px;
      padding: 18px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      min-height: 120px;
    }

    .gearBoxTitle {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 10px;
      opacity: 0.75;
    }

    .gearBoxValue {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.3;
    }

    .forecastTitle {
      text-align: center;
      font-size: 24px;
      font-family: "Paytone One", sans-serif;
      letter-spacing: 2px;
      margin-bottom: 14px;
      opacity: 0.85;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .dayCard {
      background: #fff8ef;
      border-radius: 16px;
      padding: 26px 20px;
      text-align: center;
      border: 1px solid #e7dccd;
      position: relative;
    }

    .today {
      border: 2px solid #3f5f6b;
      box-shadow: 0 0 0 3px rgba(63,95,107,0.15);
      background: #f6f1e7;
    }

    .todayTag {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #3f5f6b;
      color: white;
      font-size: 12px;
      font-weight: 900;
      padding: 5px 10px;
      border-radius: 999px;
    }

    .dayName {
      font-weight: 900;
      margin-bottom: 14px;
      font-size: 28px;
      color: #3f3a33;
    }

    .dayCard div {
      font-size: 24px;
      line-height: 1.6;
    }

    /* EARTH TONE RISK SYSTEM */
    .bubble {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      color: white;
      margin-top: 10px;
      opacity: 0.9;
    }

    .low { background: #4f7d6b; }   /* sage green */
    .med { background: #c08a3e; }   /* clay */
    .high { background: #a33a2a; }  /* canyon rust */

    .updated {
      text-align: center;
      font-size: 14px;
      opacity: 0.6;
      margin-top: 14px;
    }

  </style>
</head>

<body>

<div class="wrap">

  <div class="title">ZION NARROWS CURRENT CONDITIONS</div>

  <div class="metrics">
    <div class="card">
      <div id="flow" class="bigNumber">--</div>
      <div class="label">CFS</div>
      <div id="trend" class="trendInside">--</div>
    </div>

    <div class="card">
      <div id="temp" class="tempNumber">--</div>
      <div class="label">WATER TEMP</div>
    </div>
  </div>

  <div class="statusLabel">NARROWS HIKE STATUS</div>
  <div id="status" class="statusBlock">LOADING</div>

  <div class="gearWrapper">
    <div class="gearTitle">RECOMMENDED PACKAGES</div>
    <div class="gearGrid">
      <div class="gearBox">
        <div class="gearBoxTitle">HIKING TODAY</div>
        <div id="gearToday" class="gearBoxValue">--</div>
      </div>

      <div class="gearBox">
        <div class="gearBoxTitle">HIKING TOMORROW</div>
        <div id="gearTomorrow" class="gearBoxValue">--</div>
      </div>
    </div>
  </div>

  <div>
    <div class="forecastTitle">3-DAY ZION FORECAST</div>
    <div id="forecast" class="forecast"></div>
    <div id="updated" class="updated"></div>
  </div>

</div>

<script>

let lastCFS = null;

async function load() {

  const river = await fetch(
    "https://waterservices.usgs.gov/nwis/iv/?format=json&sites=09405500&parameterCd=00060,00010"
  ).then(r => r.json());

  const series = river?.value?.timeSeries || [];

  let cfs = null;
  let tempC = null;

  series.forEach(s => {
    const code = s?.variable?.variableCode?.[0]?.value;
    const val = s?.values?.[0]?.value?.[0]?.value;

    if (code === "00060") cfs = Number(val);
    if (code === "00010") tempC = Number(val);
  });

  const tempF = tempC !== null ? tempC * 9/5 + 32 : null;

  document.getElementById("flow").innerText = cfs.toFixed(0);

  document.getElementById("temp").innerText =
    tempF !== null
      ? `${tempF.toFixed(0)}°F / ${tempC.toFixed(0)}°C`
      : "Loading...";

  let trend = "→ steady";

  if (lastCFS !== null) {
    const diff = cfs - lastCFS;
    if (diff > 5) trend = "↗ rising";
    else if (diff < -5) trend = "↘ falling";
  }

  lastCFS = cfs;
  document.getElementById("trend").innerText = trend;

  // STATUS (earth tone)
  let status = "";
  let color = "";

  if (cfs <= 119) {
    status = "OPEN";
    color = "#2f6f5e";
  }
  else if (cfs <= 149) {
    status = "BOTTOM-UP OPEN / TOP-DOWN CLOSED";
    color = "#c08a3e";
  }
  else {
    status = "CLOSED";
    color = "#a33a2a";
  }

  const statusEl = document.getElementById("status");
  statusEl.innerText = status;
  statusEl.style.background = color;

  // GEARS (restored logic)
  let todayGear = "";
  let tomorrowGear = "";

  if (tempF === null) {
    todayGear = "Loading...";
    tomorrowGear = "Loading...";
  } else {

    if (tempF > 65 && cfs < 150) todayGear = "Footwear Package";
    else if (tempF < 65 && cfs < 100) todayGear = "Dry Bib Package";
    else if (tempF < 65 && cfs > 100) todayGear = "Dry Suit Package";
    else todayGear = "Standard Canyon Gear";

    tomorrowGear = todayGear; // same baseline logic
  }

  document.getElementById("gearToday").innerText = todayGear;
  document.getElementById("gearTomorrow").innerText = tomorrowGear;

  const wx = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=37.2&longitude=-113.0&daily=precipitation_sum,temperature_2m_max,temperature_2m_min&timezone=auto"
  ).then(r => r.json());

  const labels = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    labels.push(`${d.getMonth()+1}-${d.getDate()}`);
  }

  function risk(v) {
    if (v < 0.25) return "low";
    if (v < 0.75) return "med";
    return "high";
  }

  let html = "";

  for (let i = 0; i < 3; i++) {

    const hiF = wx.daily.temperature_2m_max[i] * 9/5 + 32;
    const loF = wx.daily.temperature_2m_min[i] * 9/5 + 32;

    const r = risk(wx.daily.precipitation_sum[i]);

    const label =
      r === "low"
        ? "Chance of rain: LOW"
        : r === "med"
          ? "Chance of rain: MODERATE"
          : "Chance of rain: HIGH";

    html += `
      <div class="dayCard ${i===0?"today":""}">
        ${i===0?`<div class="todayTag">TODAY</div>`:""}
        <div class="dayName">${labels[i]}</div>

        <div>Precipitation: ${wx.daily.precipitation_sum[i]} in</div>

        <div class="bubble ${r}">
          ${label}
        </div>

        <div>H ${hiF.toFixed(0)}°F / ${wx.daily.temperature_2m_max[i].toFixed(0)}°C</div>
        <div>L ${loF.toFixed(0)}°F / ${wx.daily.temperature_2m_min[i].toFixed(0)}°C</div>
      </div>
    `;
  }

  document.getElementById("forecast").innerHTML = html;

  document.getElementById("updated").innerText =
    "Last Updated: " + new Date().toLocaleString();
}

load();
setInterval(load, 60000);

</script>

</body>
</html>
