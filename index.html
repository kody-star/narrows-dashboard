<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zion Narrows Conditions</title>

  <style>
    body {
      margin: 0;
      background: #f6f8fb;
      color: #111827;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 50px;
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      font-size: 26px;
      letter-spacing: 3px;
      opacity: 0.85;
      color: #111827;
    }

    .flow {
      text-align: center;
      font-size: 140px;
      font-weight: 900;
      margin-top: 20px;
    }

    .barWrap {
      width: 60%;
      margin: 0 auto;
      height: 18px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #16a34a;
      transition: width 0.5s ease;
    }

    .temp {
      text-align: center;
      font-size: 28px;
      margin-top: 10px;
      opacity: 0.9;
    }

    .status {
      margin: 25px auto;
      padding: 18px 30px;
      border-radius: 16px;
      font-size: 42px;
      font-weight: 900;
      text-align: center;
      display: inline-block;
      color: white;
    }

    .gear {
      text-align: center;
      font-size: 26px;
      margin-top: 10px;
    }

    .forecast-title {
      text-align: center;
      margin-top: 50px;
      font-size: 20px;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    .forecast {
      text-align: center;
      margin-top: 20px;
      font-size: 26px;
      line-height: 1.8;
      font-weight: 700;
    }

    .updated {
      text-align: center;
      font-size: 14px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="title">ZION NARROWS CURRENT CONDITIONS</div>

  <div id="flow" class="flow">--</div>

  <!-- VISUAL RIVER BAR -->
  <div class="barWrap">
    <div id="bar" class="bar"></div>
  </div>

  <div id="temp" class="temp">Loading river data...</div>

  <div style="text-align:center;">
    <div id="status" class="status">LOADING</div>
  </div>

  <div id="gear" class="gear"></div>

  <div class="forecast-title">5-DAY SPRINGDALE PRECIPITATION FORECAST</div>

  <div id="forecast" class="forecast"></div>

  <div id="updated" class="updated"></div>

</div>

<script>
async function load() {

  try {

    const river = await fetch(
      "https://waterservices.usgs.gov/nwis/iv/?format=json&sites=09405500&parameterCd=00060,00010"
    ).then(r => r.json());

    const series = river?.value?.timeSeries || [];

    let cfs = null;
    let tempC = null;

    series.forEach(s => {
      const code = s?.variable?.variableCode?.[0]?.value;
      const val = s?.values?.[0]?.value?.[0]?.value;

      if (code === "00060") cfs = Number(val);
      if (code === "00010") tempC = Number(val);
    });

    const tempF = tempC ? (tempC * 9/5 + 32) : null;

    // ---------------- STATUS ----------------
    let status = "";
    let color = "";

    if (cfs > 150) {
      status = "CLOSED";
      color = "#dc2626";
    } else if (cfs > 120) {
      status = "TOP-DOWN CLOSED";
      color = "#f59e0b";
    } else {
      status = "OPEN";
      color = "#16a34a";
    }

    // ---------------- BAR GRAPHIC ----------------
    let barPct = Math.min((cfs / 200) * 100, 100);

    document.getElementById("bar").style.width = barPct + "%";
    document.getElementById("bar").style.background = color;

    // ---------------- GEAR ----------------
    let gear = "";

    if (tempF && cfs > 100 && tempF < 65) {
      gear = "Recommended: Dry Suit Package";
    } else if (tempF && cfs < 100 && tempF < 65) {
      gear = "Recommended: Dry Bib Package";
    } else if (tempF && cfs < 150 && tempF > 65) {
      gear = "Recommended: Footwear Package";
    } else {
      gear = "Recommended: Standard Canyon Footwear";
    }

    document.getElementById("flow").innerText = cfs + " CFS";
    document.getElementById("temp").innerText =
      "Water Temp: " + (tempF ? tempF.toFixed(1) + "°F" : "N/A");

    const statusEl = document.getElementById("status");
    statusEl.innerText = status;
    statusEl.style.background = color;

    document.getElementById("gear").innerText = gear;

    // ---------------- WEATHER ----------------
    const wx = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=37.2&longitude=-113.0&daily=precipitation_sum&timezone=auto"
    ).then(r => r.json());

    const p = wx?.daily?.precipitation_sum || [];
    const days = ["Mon","Tue","Wed","Thu","Fri"];

    let html = "";

    for (let i = 0; i < 5; i++) {
      html += `${days[i]} — ${p[i] ?? 0} in<br>`;
    }

    document.getElementById("forecast").innerHTML = html;

    document.getElementById("updated").innerText =
      "Last Updated: " + new Date().toLocaleString();

  } catch (e) {
    console.log(e);
    document.getElementById("status").innerText = "DATA ERROR";
    document.getElementById("status").style.background = "#6b7280";
  }
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
