<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zion Narrows Conditions</title>

  <style>
    body {
      margin: 0;
      background: #f6f8fb;
      color: #111827;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 50px;
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      font-size: 26px;
      letter-spacing: 3px;
      opacity: 0.85;
    }

    /* TOP METRICS */
    .topRow {
      display: flex;
      justify-content: center;
      gap: 80px;
      margin-top: 30px;
      align-items: center;
    }

    .bigStat {
      text-align: center;
    }

    .bigNumber {
      font-size: 110px;
      font-weight: 900;
      line-height: 1;
    }

    .label {
      font-size: 18px;
      opacity: 0.6;
    }

    .trend {
      text-align: center;
      font-size: 28px;
      margin-top: 10px;
      font-weight: 700;
    }

    .status {
      margin: 25px auto;
      padding: 18px 30px;
      border-radius: 16px;
      font-size: 42px;
      font-weight: 900;
      text-align: center;
      display: inline-block;
      color: white;
    }

    .gear {
      text-align: center;
      font-size: 26px;
      margin-top: 10px;
    }

    /* FORECAST */
    .forecastTitle {
      text-align: center;
      margin-top: 50px;
      font-size: 20px;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    .forecast {
      max-width: 900px;
      margin: 20px auto;
      font-size: 22px;
      font-weight: 600;
    }

    .day {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
      align-items: center;
    }

    .bubble {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .low { background: #16a34a; }
    .med { background: #f59e0b; }
    .high { background: #dc2626; }

    .updated {
      text-align: center;
      font-size: 14px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="title">ZION NARROWS CURRENT CONDITIONS</div>

  <!-- TOP ROW -->
  <div class="topRow">

    <div class="bigStat">
      <div id="flow" class="bigNumber">--</div>
      <div class="label">CFS</div>
    </div>

    <div class="bigStat">
      <div id="temp" class="bigNumber">--</div>
      <div class="label">°F WATER</div>
    </div>

  </div>

  <div id="trend" class="trend">--</div>

  <div style="text-align:center;">
    <div id="status" class="status">LOADING</div>
  </div>

  <div id="gear" class="gear"></div>

  <div class="forecastTitle">5-DAY ZION FORECAST</div>

  <div id="forecast" class="forecast"></div>

  <div id="updated" class="updated"></div>

</div>

<script>
let lastCFS = null;

async function load() {

  try {

    // ---------------- RIVER ----------------
    const river = await fetch(
      "https://waterservices.usgs.gov/nwis/iv/?format=json&sites=09405500&parameterCd=00060,00010"
    ).then(r => r.json());

    const series = river?.value?.timeSeries || [];

    let cfs = null;
    let tempC = null;

    series.forEach(s => {
      const code = s?.variable?.variableCode?.[0]?.value;
      const val = s?.values?.[0]?.value?.[0]?.value;

      if (code === "00060") cfs = Number(val);
      if (code === "00010") tempC = Number(val);
    });

    const tempF = tempC ? (tempC * 9/5 + 32) : null;

    // ---------------- TREND ----------------
    let trend = "→ steady";

    if (lastCFS !== null) {
      const diff = cfs - lastCFS;

      if (diff > 5) trend = "↗ rising";
      else if (diff < -5) trend = "↘ falling";
      else trend = "→ steady";
    }

    lastCFS = cfs;

    // ---------------- STATUS ----------------
    let status = "";
    let color = "";

    if (cfs > 150) {
      status = "CLOSED";
      color = "#ef4444";
    } else if (cfs > 120) {
      status = "TOP-DOWN CLOSED";
      color = "#f59e0b";
    } else {
      status = "OPEN";
      color = "#16a34a";
    }

    document.getElementById("flow").innerText = cfs.toFixed(0);
    document.getElementById("temp").innerText = tempF.toFixed(0);
    document.getElementById("trend").innerText = "Flow Trend: " + trend;

    const statusEl = document.getElementById("status");
    statusEl.innerText = status;
    statusEl.style.background = color;

    // ---------------- GEAR ----------------
    let gear = "";

    if (tempF && cfs > 100 && tempF < 65) {
      gear = "Recommended: Dry Suit Package";
    } else if (tempF && cfs < 100 && tempF < 65) {
      gear = "Recommended: Dry Bib Package";
    } else if (tempF && cfs < 150 && tempF > 65) {
      gear = "Recommended: Footwear Package";
    } else {
      gear = "Recommended: Standard Canyon Footwear";
    }

    document.getElementById("gear").innerText = gear;

    // ---------------- WEATHER ----------------
    const wx = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=37.2&longitude=-113.0&daily=precipitation_sum,temperature_2m_max,temperature_2m_min&timezone=auto"
    ).then(r => r.json());

    const days = wx.daily.time;
    const precip = wx.daily.precipitation_sum;
    const tMax = wx.daily.temperature_2m_max;
    const tMin = wx.daily.temperature_2m_min;

    const labels = ["Mon","Tue","Wed","Thu","Fri"];

    function risk(val) {
      if (val < 0.25) return "low";
      if (val < 0.75) return "med";
      return "high";
    }

    let html = "";

    for (let i = 0; i < 5; i++) {

      const hiF = (tMax[i] * 9/5 + 32);
      const loF = (tMin[i] * 9/5 + 32);

      html += `
        <div class="day">
          <div>
            ${labels[i]} — ${precip[i]} in |
            H ${hiF.toFixed(0)}°F / ${tMax[i].toFixed(0)}°C |
            L ${loF.toFixed(0)}°F / ${tMin[i].toFixed(0)}°C
          </div>
          <div class="bubble ${risk(precip[i])}">
            ${risk(precip[i]).toUpperCase()}
          </div>
        </div>
      `;
    }

    document.getElementById("forecast").innerHTML = html;

    document.getElementById("updated").innerText =
      "Last Updated: " + new Date().toLocaleString();

  } catch (e) {
    console.log(e);
    document.getElementById("status").innerText = "DATA ERROR";
    document.getElementById("status").style.background = "#6b7280";
  }
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
