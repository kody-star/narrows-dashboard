<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zion Narrows Conditions</title>

  <link href="https://fonts.googleapis.com/css2?family=Paytone+One&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f3f6fb;
      font-family: "Century Gothic", Arial, sans-serif;
      color: #111827;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 3vh 4vw;
      box-sizing: border-box;
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      gap: 18px;
    }

    .title {
      text-align: center;
      font-size: 44px;
      font-family: "Paytone One", sans-serif;
      letter-spacing: 3px;
    }

    .metrics {
      display: flex;
      justify-content: space-between;
      gap: 24px;
    }

    .card {
      flex: 1;
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .bigNumber {
      font-size: 110px;
      font-weight: 900;
      line-height: 1;
    }

    .tempNumber {
      font-size: 75px;
      font-weight: 900;
      line-height: 1;
    }

    .label {
      margin-top: 8px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    .trendInside {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
      opacity: 0.85;
    }

    .statusLabel {
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 2px;
      opacity: 0.7;
      margin-bottom: -6px;
    }

    .statusBlock {
      width: 100%;
      background: white;
      border-radius: 18px;
      padding: 6px 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 28px;
      font-weight: 900;
      color: white;
      margin: 0;
    }

    /* GEAR */
    .gearWrapper {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;
    }

    .gearTitle {
      text-align: center;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    .gearGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .gearBox {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      min-height: 120px;
    }

    .gearBoxTitle {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    .gearBoxValue {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.3;
    }

    .forecastTitle {
      text-align: center;
      font-size: 24px;
      font-family: "Paytone One", sans-serif;
      letter-spacing: 2px;
      margin-bottom: 14px;
      opacity: 0.85;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .dayCard {
      background: #f8fafc;
      border-radius: 16px;
      padding: 26px 20px;
      text-align: center;
      border: 1px solid #e5e7eb;
      position: relative;
    }

    .today {
      border: 2px solid #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
      background: #eff6ff;
    }

    .todayTag {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #2563eb;
      color: white;
      font-size: 12px;
      font-weight: 900;
      padding: 5px 10px;
      border-radius: 999px;
    }

    .dayName {
      font-weight: 900;
      margin-bottom: 14px;
      font-size: 28px;
    }

    .dayCard div {
      font-size: 24px;
      line-height: 1.6;
    }

    .bubble {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 800;
      color: white;
      margin-top: 12px;
    }

    .low { background: #16a34a; }
    .med { background: #f59e0b; }
    .high { background: #dc2626; }

    .updated {
      text-align: center;
      font-size: 14px;
      opacity: 0.6;
      margin-top: 14px;
    }

  </style>
</head>

<body>

<div class="wrap">

  <div class="title">ZION NARROWS CURRENT CONDITIONS</div>

  <div class="metrics">

    <div class="card">
      <div id="flow" class="bigNumber">--</div>
      <div class="label">CFS</div>
      <div id="trend" class="trendInside">--</div>
    </div>

    <div class="card">
      <div id="temp" class="tempNumber">--</div>
      <div class="label">WATER TEMP</div>
    </div>

  </div>

  <div class="statusLabel">NARROWS HIKE STATUS</div>
  <div id="status" class="statusBlock">LOADING</div>

  <div class="gearWrapper">
    <div class="gearTitle">RECOMMENDED PACKAGES</div>
    <div id="gear" class="gearGrid"></div>
  </div>

  <div>
    <div class="forecastTitle">3-DAY ZION FORECAST</div>
    <div id="forecast" class="forecast"></div>
    <div id="updated" class="updated"></div>
  </div>

</div>

<script>

let lastCFS = null;

async function load() {

  const river = await fetch(
    "https://waterservices.usgs.gov/nwis/iv/?format=json&sites=09405500&parameterCd=00060,00010"
  ).then(r => r.json());

  const series = river?.value?.timeSeries || [];

  let cfs = null;
  let tempC = null;

  series.forEach(s => {
    const code = s?.variable?.variableCode?.[0]?.value;
    const val = s?.values?.[0]?.value?.[0]?.value;

    if (code === "00060") cfs = Number(val);
    if (code === "00010") tempC = Number(val);
  });

  const tempF = tempC * 9/5 + 32;

  document.getElementById("flow").innerText = cfs.toFixed(0);
  document.getElementById("temp").innerText =
    `${tempF.toFixed(0)}°F / ${tempC.toFixed(0)}°C`;

  let trend = "→ steady";

  if (lastCFS !== null) {
    const diff = cfs - lastCFS;
    if (diff > 5) trend = "↗ rising";
    else if (diff < -5) trend = "↘ falling";
  }

  lastCFS = cfs;
  document.getElementById("trend").innerText = trend;

  let status = "";
  let color = "";

  if (cfs > 150) { status = "CLOSED"; color = "#ef4444"; }
  else if (cfs > 120) { status = "TOP-DOWN CLOSED"; color = "#f59e0b"; }
  else { status = "OPEN"; color = "#16a34a"; }

  const statusEl = document.getElementById("status");
  statusEl.innerText = status;
  statusEl.style.background = color;

  const wx = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=37.2&longitude=-113.0&daily=precipitation_sum,temperature_2m_max,temperature_2m_min&timezone=auto"
  ).then(r => r.json());

  function getGear(tempF, cfs) {
    if (tempF > 65 && cfs < 150) return "Footwear Package";
    if (tempF < 65 && cfs < 100) return "Dry Bib Package";
    if (tempF < 65 && cfs > 100) return "Dry Suit Package";
    return "Standard Canyon Gear";
  }

  const current = getGear(tempF, cfs);

  const now = new Date();
  const key = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
  const savedKey = localStorage.getItem("gearKey");
  let tomorrow = localStorage.getItem("gearTomorrow");

  if (now.getHours() >= 8 && savedKey !== key) {
    localStorage.setItem("gearTomorrow", current);
    localStorage.setItem("gearKey", key);
    tomorrow = current;
  }

  if (!tomorrow) tomorrow = current;

  document.getElementById("gear").innerHTML = `
    <div class="gearBox">
      <div class="gearBoxTitle">HIKING NOW</div>
      <div class="gearBoxValue">${current}</div>
    </div>

    <div class="gearBox">
      <div class="gearBoxTitle">TOMORROW MORNING</div>
      <div class="gearBoxValue">${tomorrow}</div>
    </div>
  `;

  const labels = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    labels.push(`${d.getMonth()+1}-${d.getDate()}`);
  }

  function risk(v) {
    if (v < 0.25) return "low";
    if (v < 0.75) return "med";
    return "high";
  }

  let html = "";

  for (let i = 0; i < 3; i++) {

    const hiF = wx.daily.temperature_2m_max[i] * 9/5 + 32;
    const loF = wx.daily.temperature_2m_min[i] * 9/5 + 32;

    const r = risk(wx.daily.precipitation_sum[i]);

    let label =
      r === "low"
        ? "LOW CHANCE OF RAIN"
        : r === "med"
          ? "MODERATE CHANCE OF RAIN"
          : "HIGH CHANCE OF RAIN";

    html += `
      <div class="dayCard ${i===0?"today":""}">
        ${i===0?`<div class="todayTag">TODAY</div>`:""}
        <div class="dayName">${labels[i]}</div>

        <div>${wx.daily.precipitation_sum[i]} in</div>

        <div class="bubble ${r}">
          ${label}
        </div>

        <div>H ${hiF.toFixed(0)}°F / ${wx.daily.temperature_2m_max[i].toFixed(0)}°C</div>
        <div>L ${loF.toFixed(0)}°F / ${wx.daily.temperature_2m_min[i].toFixed(0)}°C</div>
      </div>
    `;
  }

  document.getElementById("forecast").innerHTML = html;

  document.getElementById("updated").innerText =
    "Last Updated: " + new Date().toLocaleString();
}

load();
setInterval(load, 60000);

</script>

</body>
</html>
