<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zion Narrows Conditions</title>

  <style>
    body {
      margin: 0;
      background: #070b14;
      color: white;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 50px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .title {
      text-align: center;
      font-size: 26px;
      letter-spacing: 3px;
      opacity: 0.85;
    }

    .flow {
      text-align: center;
      font-size: 150px;
      font-weight: 900;
      margin-top: 10px;
      line-height: 1;
    }

    .trend {
      text-align: center;
      font-size: 32px;
      margin-top: 5px;
      opacity: 0.9;
    }

    .status {
      margin: 25px auto;
      padding: 18px 28px;
      border-radius: 14px;
      font-size: 44px;
      font-weight: 900;
      display: inline-block;
    }

    .mid {
      text-align: center;
      font-size: 24px;
      margin-top: 10px;
      line-height: 1.6;
      opacity: 0.95;
    }

    .gear {
      text-align: center;
      font-size: 26px;
      margin-top: 10px;
      font-weight: 700;
    }

    .updated {
      text-align: center;
      font-size: 14px;
      opacity: 0.6;
      margin-top: 10px;
    }

    .forecast-title {
      text-align: center;
      margin-top: 45px;
      font-size: 20px;
      letter-spacing: 2px;
      opacity: 0.75;
    }

    .forecast {
      width: 100%;
      max-width: 900px;
      align-self: center;
      margin-top: 20px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.8;
    }

    .low { color: #16a34a; }
    .med { color: #f59e0b; }
    .high { color: #dc2626; }
  </style>
</head>

<body>

<div class="wrap">

  <div class="title">ZION NARROWS CURRENT CONDITIONS</div>

  <div id="flow" class="flow">--</div>

  <div id="trend" class="trend">--</div>

  <div style="text-align:center;">
    <div id="status" class="status">LOADING</div>
  </div>

  <div id="mid" class="mid">Loading conditions...</div>

  <div id="gear" class="gear"></div>

  <div id="updated" class="updated"></div>

  <div class="forecast-title">5-DAY RISK FORECAST</div>

  <div id="forecast" class="forecast"></div>

</div>

<script>
async function load() {

  try {

    // ---------------- USGS RIVER ----------------
    const river = await fetch(
      "https://waterservices.usgs.gov/nwis/iv/?format=json&sites=09405500&parameterCd=00060,00010"
    ).then(r => r.json());

    const series = river?.value?.timeSeries || [];

    let cfs = null;
    let tempC = null;

    series.forEach(s => {
      const code = s?.variable?.variableCode?.[0]?.value;
      const val = s?.values?.[0]?.value?.[0]?.value;

      if (code === "00060") cfs = Number(val);
      if (code === "00010") tempC = Number(val);
    });

    const tempF = tempC ? (tempC * 9/5 + 32) : null;

    // ---------------- SIMPLE TREND ----------------
    let trend = "→ stable";
    if (cfs > 140) trend = "↗ rising";
    if (cfs < 110) trend = "↘ falling";

    // ---------------- STATUS (STRICT MODE) ----------------
    let status = "";
    let color = "";

    if (cfs > 150) {
      status = "CLOSED";
      color = "#dc2626";
    } else if (cfs > 120) {
      status = "TOP-DOWN CLOSED";
      color = "#f59e0b";
    } else {
      status = "OPEN — SAFE TO ENTER";
      color = "#16a34a";
    }

    // ---------------- GEAR ----------------
    let gear = "";

    if (tempF && cfs > 100 && tempF < 65) {
      gear = "Gear: DRY SUIT PACKAGE";
    } else if (tempF && cfs < 100 && tempF < 65) {
      gear = "Gear: DRY BIB PACKAGE";
    } else if (tempF && cfs < 150 && tempF > 65) {
      gear = "Gear: FOOTWEAR PACKAGE";
    } else {
      gear = "Gear: STANDARD CANYON FOOTWEAR";
    }

    // ---------------- RENDER CORE ----------------
    document.getElementById("flow").innerText = cfs + " CFS";
    document.getElementById("trend").innerText = trend;

    const statusEl = document.getElementById("status");
    statusEl.innerText = status;
    statusEl.style.background = color;

    document.getElementById("mid").innerHTML =
      `Water Temp: ${tempF.toFixed(1)}°F<br>Recent Rain: LOW`;

    document.getElementById("gear").innerText = gear;

    document.getElementById("updated").innerText =
      "Last Updated: " + new Date().toLocaleTimeString();

    // ---------------- WEATHER ----------------
    const wx = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=37.2&longitude=-113.0&daily=precipitation_sum&timezone=auto"
    ).then(r => r.json());

    const p = wx?.daily?.precipitation_sum || [];

    const mapRisk = (val) => {
      if (val < 0.25) return "low";
      if (val < 0.75) return "med";
      return "high";
    };

    const labels = ["Mon","Tue","Wed","Thu","Fri"];

    let html = "";

    for (let i = 0; i < 5; i++) {
      const risk = mapRisk(p[i] ?? 0);
      html += `<div><span class="${risk}">${labels[i]} — ${risk.toUpperCase()}</span></div>`;
    }

    document.getElementById("forecast").innerHTML = html;

  } catch (e) {
    console.log(e);
    document.getElementById("status").innerText = "DATA ERROR";
    document.getElementById("status").style.background = "#6b7280";
  }
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
