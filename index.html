<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zion Narrows Conditions</title>

  <link href="https://fonts.googleapis.com/css2?family=Paytone+One&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f3f6fb;
      font-family: "Century Gothic", Arial, sans-serif;
      color: #111827;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 3vh 4vw;
      box-sizing: border-box;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 18px;
    }

    .title {
      text-align: center;
      font-size: 30px;
      font-family: "Paytone One", sans-serif;
      letter-spacing: 3px;
    }

    /* METRICS */
    .metrics {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .card {
      flex: 1;
      max-width: 420px;
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;
      text-align: center;

      /* helps perfect centering inside card */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .bigNumber {
      font-size: 110px;
      font-weight: 900;
      line-height: 1;
    }

    /* WATER TEMP STILL SMALLER + CENTERED */
    .tempNumber {
      font-size: 75px;
      font-weight: 900;
      line-height: 1;
      text-align: center;
    }

    .label {
      margin-top: 8px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    /* FLOW TREND NOW INSIDE CFS CARD */
    .trendInside {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
      opacity: 0.85;
    }

    /* STATUS (SMALLER AS REQUESTED) */
 .statusBlock {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  padding: 10px 22px;
  border-radius: 16px;

  font-size: 28px;
  font-weight: 900;
  color: white;

  box-shadow: 0 10px 25px rgba(0,0,0,0.12);

  /* KEY FIXES */
  width: max-content;     /* prevents full-width expansion */
  max-width: 420px;       /* matches single card scale */
  margin: 0 auto;         /* centers it */

  white-space: nowrap;    /* prevents wrapping height growth */
}

    .gear {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-top: 6px;
      opacity: 0.9;
    }

    /* FORECAST */
    .forecastTitle {
      text-align: center;
      font-size: 20px;
      font-family: "Paytone One", sans-serif;
      letter-spacing: 2px;
      margin-bottom: 10px;
      opacity: 0.85;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .dayCard {
      background: #f8fafc;
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      border: 1px solid #e5e7eb;
    }

    .dayName {
      font-weight: 900;
      margin-bottom: 6px;
    }

    .bubble {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      color: white;
      margin-top: 6px;
    }

    .low { background: #16a34a; }
    .med { background: #f59e0b; }
    .high { background: #dc2626; }

    .updated {
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="title">ZION NARROWS CURRENT CONDITIONS</div>

  <!-- METRICS -->
  <div class="metrics">

    <!-- CFS CARD -->
    <div class="card">
      <div id="flow" class="bigNumber">--</div>
      <div class="label">CFS</div>
      <div id="trend" class="trendInside">--</div>
    </div>

    <!-- TEMP CARD -->
    <div class="card">
      <div id="temp" class="tempNumber">--</div>
      <div class="label">WATER TEMP</div>
    </div>

  </div>

  <!-- STATUS -->
  <div id="status" class="statusBlock">LOADING</div>

  <div id="gear" class="gear"></div>

  <!-- FORECAST -->
  <div>
    <div class="forecastTitle">5-DAY ZION FORECAST</div>
    <div id="forecast" class="forecast"></div>
    <div id="updated" class="updated"></div>
  </div>

</div>

<script>
let lastCFS = null;

async function load() {

  const river = await fetch(
    "https://waterservices.usgs.gov/nwis/iv/?format=json&sites=09405500&parameterCd=00060,00010"
  ).then(r => r.json());

  const series = river?.value?.timeSeries || [];

  let cfs = null;
  let tempC = null;

  series.forEach(s => {
    const code = s?.variable?.variableCode?.[0]?.value;
    const val = s?.values?.[0]?.value?.[0]?.value;

    if (code === "00060") cfs = Number(val);
    if (code === "00010") tempC = Number(val);
  });

  const tempF = tempC * 9/5 + 32;

  document.getElementById("flow").innerText = cfs.toFixed(0);

  document.getElementById("temp").innerText =
    `${tempF.toFixed(0)}°F / ${tempC.toFixed(0)}°C`;

  // TREND NOW INSIDE CFS CARD
  let trend = "→ steady";
  if (lastCFS !== null) {
    const diff = cfs - lastCFS;
    if (diff > 5) trend = "↗ rising";
    else if (diff < -5) trend = "↘ falling";
  }
  lastCFS = cfs;

  document.getElementById("trend").innerText = trend;

  // STATUS
  let status = "";
  let color = "";

  if (cfs > 150) {
    status = "CLOSED";
    color = "#ef4444";
  } else if (cfs > 120) {
    status = "TOP-DOWN CLOSED";
    color = "#f59e0b";
  } else {
    status = "OPEN";
    color = "#16a34a";
  }

  const statusEl = document.getElementById("status");
  statusEl.innerText = status;
  statusEl.style.background = color;

  // GEAR
  let gear = "";

  if (tempF > 65 && cfs < 150) gear = "Footwear Package Recommended";
  else if (tempF < 65 && cfs < 100) gear = "Dry Bib Package Recommended";
  else if (tempF < 65 && cfs > 100) gear = "Dry Suit Package Recommended";
  else gear = "Standard Canyon Gear";

  document.getElementById("gear").innerText = gear;

  // WEATHER (F + C RESTORED)
  const wx = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=37.2&longitude=-113.0&daily=precipitation_sum,temperature_2m_max,temperature_2m_min&timezone=auto"
  ).then(r => r.json());

  const labels = ["Mon","Tue","Wed","Thu","Fri"];

  function risk(v){
    if (v < 0.25) return "low";
    if (v < 0.75) return "med";
    return "high";
  }

  let html = "";

  for (let i = 0; i < 5; i++) {

    const hiF = wx.daily.temperature_2m_max[i] * 9/5 + 32;
    const loF = wx.daily.temperature_2m_min[i] * 9/5 + 32;

    html += `
      <div class="dayCard">
        <div class="dayName">${labels[i]}</div>
        <div>${wx.daily.precipitation_sum[i]} in</div>

        <!-- BOTH UNITS RESTORED -->
        <div>H ${hiF.toFixed(0)}°F / ${wx.daily.temperature_2m_max[i].toFixed(0)}°C</div>
        <div>L ${loF.toFixed(0)}°F / ${wx.daily.temperature_2m_min[i].toFixed(0)}°C</div>

        <div class="bubble ${risk(wx.daily.precipitation_sum[i])}">
          ${risk(wx.daily.precipitation_sum[i]).toUpperCase()}
        </div>
      </div>
    `;
  }

  document.getElementById("forecast").innerHTML = html;

  document.getElementById("updated").innerText =
    "Last Updated: " + new Date().toLocaleString();
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
