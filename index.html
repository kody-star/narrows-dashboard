<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zion Narrows Conditions</title>

  <link href="https://fonts.googleapis.com/css2?family=Paytone+One&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f6f8fb;
      color: #111827;
      font-family: "Century Gothic", CenturyGothic, AppleGothic, Arial, sans-serif;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 4vh 6vw;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .title {
      text-align: center;
      font-size: clamp(22px, 2.2vw, 34px);
      letter-spacing: 3px;
      opacity: 0.85;
      font-family: "Paytone One", sans-serif;
    }

    .topRow {
      display: flex;
      justify-content: center;
      gap: 10vw;
      align-items: center;
      margin-top: 2vh;
    }

    .bigStat {
      text-align: center;
    }

    .bigNumber {
      font-size: clamp(80px, 10vw, 150px);
      font-weight: 900;
      line-height: 1;
    }

    /* 🔥 WATER TEMP NOW ~1/3 SMALLER VISUALLY */
    .tempNumber {
      font-size: clamp(50px, 6.5vw, 95px);
      font-weight: 900;
      line-height: 1;
    }

    .label {
      font-size: clamp(14px, 1.5vw, 20px);
      opacity: 0.6;
    }

    .trend {
      text-align: center;
      font-size: clamp(18px, 2vw, 30px);
      margin-top: 10px;
      font-weight: 700;
    }

    .status {
      margin: 2vh auto;
      padding: 1.5vh 2vw;
      border-radius: 16px;
      font-size: clamp(28px, 3vw, 48px);
      font-weight: 900;
      text-align: center;
      display: inline-block;
      color: white;
    }

    .gear {
      text-align: center;
      font-size: clamp(18px, 2vw, 28px);
      margin-top: 1vh;
    }

    .forecastTitle {
      text-align: center;
      margin-top: 3vh;
      font-size: clamp(16px, 1.8vw, 22px);
      letter-spacing: 2px;
      opacity: 0.8;
      font-family: "Paytone One", sans-serif;
    }

    .forecast {
      max-width: 1100px;
      margin: 2vh auto;
      font-size: clamp(16px, 1.6vw, 22px);
      font-weight: 600;
    }

    .day {
      display: flex;
      justify-content: space-between;
      padding: 1vh 0;
      border-bottom: 1px solid #e5e7eb;
      align-items: center;
    }

    .bubble {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .low { background: #16a34a; }
    .med { background: #f59e0b; }
    .high { background: #dc2626; }

    .updated {
      text-align: center;
      font-size: 14px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="title">ZION NARROWS CURRENT CONDITIONS</div>

  <div class="topRow">

    <div class="bigStat">
      <div id="flow" class="bigNumber">--</div>
      <div class="label">CFS</div>
    </div>

    <div class="bigStat">
      <div id="temp" class="tempNumber">--</div>
      <div class="label">WATER TEMP</div>
    </div>

  </div>

  <div id="trend" class="trend">--</div>

  <div style="text-align:center;">
    <div id="status" class="status">LOADING</div>
  </div>

  <div id="gear" class="gear"></div>

  <div class="forecastTitle">5-DAY ZION FORECAST</div>

  <div id="forecast" class="forecast"></div>

  <div id="updated" class="updated"></div>

</div>

<script>
let lastCFS = null;

async function load() {

  try {

    const river = await fetch(
      "https://waterservices.usgs.gov/nwis/iv/?format=json&sites=09405500&parameterCd=00060,00010"
    ).then(r => r.json());

    const series = river?.value?.timeSeries || [];

    let cfs = null;
    let tempC = null;

    series.forEach(s => {
      const code = s?.variable?.variableCode?.[0]?.value;
      const val = s?.values?.[0]?.value?.[0]?.value;

      if (code === "00060") cfs = Number(val);
      if (code === "00010") tempC = Number(val);
    });

    const tempF = tempC ? (tempC * 9/5 + 32) : null;

    let trend = "→ steady";

    if (lastCFS !== null) {
      const diff = cfs - lastCFS;
      if (diff > 5) trend = "↗ rising";
      else if (diff < -5) trend = "↘ falling";
    }

    lastCFS = cfs;

    let status = "";
    let color = "";

    if (cfs > 150) {
      status = "CLOSED";
      color = "#ef4444";
    } else if (cfs > 120) {
      status = "TOP-DOWN CLOSED";
      color = "#f59e0b";
    } else {
      status = "OPEN";
      color = "#16a34a";
    }

    document.getElementById("flow").innerText = cfs.toFixed(0);

    document.getElementById("temp").innerText =
      `${tempF.toFixed(0)}°F / ${tempC.toFixed(0)}°C`;

    document.getElementById("trend").innerText = "Flow Trend: " + trend;

    const statusEl = document.getElementById("status");
    statusEl.innerText = status;
    statusEl.style.background = color;

    let gear = "";

    if (tempF && cfs > 100 && tempF < 65) {
      gear = "Recommended: Dry Suit Package";
    } else if (tempF && cfs < 100 && tempF < 65) {
      gear = "Recommended: Dry Bib Package";
    } else if (tempF && cfs < 150 && tempF > 65) {
      gear = "Recommended: Footwear Package";
    } else {
      gear = "Recommended: Standard Canyon Footwear";
    }

    document.getElementById("gear").innerText = gear;

    const wx = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=37.2&longitude=-113.0&daily=precipitation_sum,temperature_2m_max,temperature_2m_min&timezone=auto"
    ).then(r => r.json());

    const labels = ["Mon","Tue","Wed","Thu","Fri"];

    function risk(v){
      if (v < 0.25) return "low";
      if (v < 0.75) return "med";
      return "high";
    }

    let html = "";

    for (let i = 0; i < 5; i++) {

      const hiF = (wx.daily.temperature_2m_max[i] * 9/5 + 32);
      const loF = (wx.daily.temperature_2m_min[i] * 9/5 + 32);

      html += `
        <div class="day">
          <div>
            ${labels[i]} — ${wx.daily.precipitation_sum[i]} in |
            H ${hiF.toFixed(0)}°F / ${wx.daily.temperature_2m_max[i].toFixed(0)}°C |
            L ${loF.toFixed(0)}°F / ${wx.daily.temperature_2m_min[i].toFixed(0)}°C
          </div>
          <div class="bubble ${risk(wx.daily.precipitation_sum[i])}">
            ${risk(wx.daily.precipitation_sum[i]).toUpperCase()}
          </div>
        </div>
      `;
    }

    document.getElementById("forecast").innerHTML = html;

    document.getElementById("updated").innerText =
      "Last Updated: " + new Date().toLocaleString();

  } catch (e) {
    console.log(e);
    document.getElementById("status").innerText = "DATA ERROR";
    document.getElementById("status").style.background = "#6b7280";
  }
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
